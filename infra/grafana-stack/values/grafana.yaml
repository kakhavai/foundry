adminPassword: admin

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-server.monitoring.svc.cluster.local
        isDefault: true
        access: proxy
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.monitoring.svc.cluster.local:3100
        access: proxy
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
          lokiSearch:
            datasourceUid: loki

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    github-stats:
      json: |
        {
          "annotations": { "list": [] },
          "editable": true,
          "graphTooltip": 0,
          "id": null,
          "links": [],
          "panels": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
              "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
              "id": 1,
              "options": {
                "legend": { "calcs": [], "displayMode": "list", "placement": "bottom" },
                "tooltip": { "mode": "single" }
              },
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "sum(rate(http_server_request_duration_seconds_count{job=\"github-stats\"}[5m])) by (http_route)",
                  "legendFormat": "{{ http_route }}"
                }
              ],
              "title": "Request Rate",
              "type": "timeseries"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": { "defaults": { "unit": "percentunit" }, "overrides": [] },
              "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
              "id": 2,
              "options": {
                "legend": { "calcs": [], "displayMode": "list", "placement": "bottom" },
                "tooltip": { "mode": "single" }
              },
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "sum(rate(http_server_request_duration_seconds_count{job=\"github-stats\",http_response_status_code=~\"4..|5..\"}[5m])) / sum(rate(http_server_request_duration_seconds_count{job=\"github-stats\"}[5m]))",
                  "legendFormat": "error rate"
                }
              ],
              "title": "Error Rate",
              "type": "timeseries"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
              "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
              "id": 3,
              "options": {
                "legend": { "calcs": [], "displayMode": "list", "placement": "bottom" },
                "tooltip": { "mode": "multi" }
              },
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "histogram_quantile(0.50, sum(rate(http_server_request_duration_seconds_bucket{job=\"github-stats\"}[5m])) by (le))",
                  "legendFormat": "P50"
                },
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket{job=\"github-stats\"}[5m])) by (le))",
                  "legendFormat": "P95"
                },
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "histogram_quantile(0.99, sum(rate(http_server_request_duration_seconds_bucket{job=\"github-stats\"}[5m])) by (le))",
                  "legendFormat": "P99"
                }
              ],
              "title": "Latency P50 / P95 / P99",
              "type": "timeseries"
            },
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
              "id": 4,
              "options": {
                "dedupStrategy": "none",
                "showLabels": false,
                "showTime": true,
                "sortOrder": "Descending",
                "wrapLogMessage": false
              },
              "targets": [
                {
                  "datasource": { "type": "loki", "uid": "loki" },
                  "expr": "{service_name=\"github-stats\"}",
                  "legendFormat": ""
                }
              ],
              "title": "Log Stream",
              "type": "logs"
            },
            {
              "datasource": { "type": "tempo", "uid": "tempo" },
              "gridPos": { "h": 8, "w": 24, "x": 0, "y": 24 },
              "id": 5,
              "options": {},
              "targets": [
                {
                  "datasource": { "type": "tempo", "uid": "tempo" },
                  "filters": [
                    {
                      "id": "service-name",
                      "operator": "=",
                      "scope": "resource",
                      "tag": "service.name",
                      "value": "github-stats",
                      "valueType": "string"
                    }
                  ],
                  "queryType": "traceqlSearch"
                }
              ],
              "title": "Trace Search",
              "type": "traces"
            }
          ],
          "refresh": "30s",
          "schemaVersion": 38,
          "tags": ["github-stats", "observability"],
          "templating": { "list": [] },
          "time": { "from": "now-1h", "to": "now" },
          "timepicker": {},
          "timezone": "browser",
          "title": "github-stats",
          "uid": "github-stats-overview",
          "version": 1
        }
