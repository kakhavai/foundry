name: Python lint and test

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
        working-directory: ${{ inputs.working-directory }}
      - run: uv run ruff check .
        working-directory: ${{ inputs.working-directory }}
      - run: uv run ruff format --check .
        working-directory: ${{ inputs.working-directory }}
      - run: uv run pytest
        working-directory: ${{ inputs.working-directory }}
